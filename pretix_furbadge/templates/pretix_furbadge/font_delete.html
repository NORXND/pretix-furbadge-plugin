{% extends "pretix_furbadge/settings_base.html" %}
{% load i18n %}
{% load bootstrap3 %}

{% block content %}
<h1>{% trans "Delete Font" %}</h1>
<form action="" method="post" class="form-horizontal">
    {% csrf_token %}
    <p>{% trans "Are you sure you want to delete the font" %} <strong>{{ object.name }}</strong>?</p>
    <div class="form-group submit-group">
        <a href="{% url "plugins:pretix_furbadge:font.list" organizer=request.organizer.slug event=request.event.slug %}" class="btn btn-default btn-cancel">
            {% trans "Cancel" %}
        </a>
        <button type="submit" class="btn btn-danger btn-save">
            {% trans "Delete" %}
        </button>
    </div>
</form>
{% endblock %}
