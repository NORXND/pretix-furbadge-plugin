{% extends "pretix_furbadge/settings_base.html" %}
{% load i18n %}

{% block content %}
<h1>{% trans "Delete Badge Type" %}</h1>
<form action="" method="post" class="form-horizontal">
    {% csrf_token %}
    <p>{% blocktrans with name=object.name %}Are you sure you want to delete the badge type <strong>{{ name }}</strong>?{% endblocktrans %}</p>
    <div class="form-group submit-group">
        <a href="{% url "plugins:pretix_furbadge:type.list" organizer=request.organizer.slug event=request.event.slug
            %}" class="btn btn-default btn-cancel">
            {% trans "Cancel" %}
        </a>
        <button type="submit" class="btn btn-danger btn-save">
            {% trans "Delete" %}
        </button>
    </div>
</form>
{% endblock %}
